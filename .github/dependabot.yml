version: 2
updates:
  # Root SPA (React/Vite)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      production:
        dependency-type: production
      dev:
        dependency-type: development

  # Upload API Cloud Function
  - package-ecosystem: npm
    directory: /functions/upload-api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Validator Cloud Function
  - package-ecosystem: npm
    directory: /functions/validator
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Loader Cloud Function
  - package-ecosystem: npm
    directory: /functions/loader
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # ML Pipelines (Python)
  - package-ecosystem: pip
    directory: /pipelines/ml
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
