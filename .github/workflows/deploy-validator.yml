name: Deploy Validator Function

on:
  push:
    branches: [main]
    paths:
      - 'functions/validator/**'
  workflow_dispatch:

env:
  PROJECT_ID: data-feeder-lcd
  REGION: australia-southeast1
  FUNCTION_NAME: validator
  FUNCTION_DIR: functions/validator
  RUNTIME: nodejs22
  ENTRY_POINT: validator

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy Validator
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Install and build function
        working-directory: ${{ env.FUNCTION_DIR }}
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloud Functions (2nd gen)
        working-directory: ${{ env.FUNCTION_DIR }}
        run: |
          gcloud functions deploy ${{ env.FUNCTION_NAME }} \
            --gen2 \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --runtime=${{ env.RUNTIME }} \
            --entry-point=${{ env.ENTRY_POINT }} \
            --trigger-topic=file-uploaded \
            --service-account=sa-validator@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="GCS_RAW_BUCKET=${{ env.PROJECT_ID }}-raw,GCS_SILVER_BUCKET=${{ env.PROJECT_ID }}-staging,GCS_REJECTED_BUCKET=${{ env.PROJECT_ID }}-rejected,FIRESTORE_DATABASE=data-feeder,VALIDATION_COMPLETE_TOPIC=validation-complete,PIPELINE_FAILED_TOPIC=pipeline-failed" \
            --memory=256Mi \
            --max-instances=10 \
            --timeout=300s \
            --source=.

      - name: Show function info
        run: |
          echo "### Validator Function Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "Function: \`${{ env.FUNCTION_NAME }}\` (trigger: \`file-uploaded\` topic)" >> "$GITHUB_STEP_SUMMARY"
