name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  build-and-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting (preview)
        if: github.event_name == 'pull_request'
        run: |
          npx firebase-tools hosting:channel:deploy pr-${{ github.event.pull_request.number }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --expires 7d \
            --json | tee channel_output.json
          url=$(jq -r '.result | to_entries[0].value.url' channel_output.json)
          echo "### Firebase Hosting Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "[${url}](${url})" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to Firebase Hosting (live)
        if: github.event_name != 'pull_request'
        run: |
          npx firebase-tools deploy --only hosting \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --non-interactive
