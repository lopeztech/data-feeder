name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'Dockerfile'
      - 'nginx.conf'
  workflow_dispatch:

env:
  PROJECT_ID: data-feeder-lcd
  REGION: australia-southeast1
  AR_REPO: data-feeder-images
  SERVICE_NAME: data-feeder-api

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Get Upload API function URL
        id: fn-url
        run: |
          url=$(gcloud functions describe upload-api \
            --gen2 \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(serviceConfig.uri)' 2>/dev/null || echo "")
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --build-arg VITE_UPLOAD_API_URL="${{ steps.fn-url.outputs.url }}" \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Smoke test deployment
        run: |
          url=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')
          fn_url="${{ steps.fn-url.outputs.url }}"
          passed=0
          failed=0

          check() {
            local name="$1" result="$2"
            if [ "$result" = "true" ]; then
              echo "✅ $name"
              passed=$((passed + 1))
            else
              echo "❌ $name"
              failed=$((failed + 1))
            fi
          }

          echo "=== SPA Smoke Tests ==="
          echo "URL: ${url}"
          echo ""

          # 1. SPA serves correctly (not Cloud Run placeholder)
          body=$(curl -s --max-time 30 "${url}")
          echo "$body" | grep -q "Data Feeder"
          check "SPA serves Data Feeder (not placeholder)" "$([ $? -eq 0 ] && echo true || echo false)"

          # 2. Health endpoint
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${url}/health")
          check "Health endpoint returns 200" "$([ "$status" = "200" ] && echo true || echo false)"

          # 3. Static assets load (CSS and JS bundles)
          css_url=$(echo "$body" | grep -oP 'href="/assets/[^"]+\.css"' | head -1 | grep -oP '/assets/[^"]+')
          if [ -n "$css_url" ]; then
            css_status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${url}${css_url}")
            check "CSS bundle loads (${css_url})" "$([ "$css_status" = "200" ] && echo true || echo false)"
          else
            check "CSS bundle found in HTML" "false"
          fi

          js_url=$(echo "$body" | grep -oP 'src="/assets/[^"]+\.js"' | head -1 | grep -oP '/assets/[^"]+')
          if [ -n "$js_url" ]; then
            js_status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${url}${js_url}")
            check "JS bundle loads (${js_url})" "$([ "$js_status" = "200" ] && echo true || echo false)"
          else
            check "JS bundle found in HTML" "false"
          fi

          # 4. SPA routing fallback (non-existent path returns index.html)
          fallback_body=$(curl -s --max-time 10 "${url}/some/random/path")
          echo "$fallback_body" | grep -q "Data Feeder"
          check "SPA fallback routing works" "$([ $? -eq 0 ] && echo true || echo false)"

          # 5. Favicon loads
          favicon_status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${url}/favicon.svg")
          check "Favicon loads" "$([ "$favicon_status" = "200" ] && echo true || echo false)"

          # 6. Cache headers on static assets
          if [ -n "$css_url" ]; then
            cache_header=$(curl -s -I --max-time 10 "${url}${css_url}" | grep -i "cache-control" | head -1)
            echo "$cache_header" | grep -qi "immutable"
            check "Static assets have immutable cache header" "$([ $? -eq 0 ] && echo true || echo false)"
          fi

          # 7. index.html has no-cache
          index_cache=$(curl -s -I --max-time 10 "${url}/" | grep -i "cache-control" | head -1)
          echo "$index_cache" | grep -qi "no-cache"
          check "index.html has no-cache header" "$([ $? -eq 0 ] && echo true || echo false)"

          echo ""
          echo "=== Upload API Smoke Tests ==="
          echo "URL: ${fn_url}"
          echo ""

          # 8. Upload API health (GET /jobs returns JSON array)
          if [ -n "$fn_url" ]; then
            jobs_status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${fn_url}/jobs")
            check "Upload API /jobs returns 200" "$([ "$jobs_status" = "200" ] && echo true || echo false)"

            jobs_body=$(curl -s --max-time 15 "${fn_url}/jobs")
            echo "$jobs_body" | head -c 1 | grep -q '['
            check "Upload API /jobs returns JSON array" "$([ $? -eq 0 ] && echo true || echo false)"

            # 9. Upload API CORS headers
            cors_header=$(curl -s -I -X OPTIONS -H "Origin: https://datafeeder.lopezcloud.dev" -H "Access-Control-Request-Method: GET" --max-time 10 "${fn_url}/jobs" | grep -i "access-control-allow-origin" | head -1)
            echo "$cors_header" | grep -q "datafeeder.lopezcloud.dev"
            check "Upload API CORS allows datafeeder.lopezcloud.dev" "$([ $? -eq 0 ] && echo true || echo false)"

            # 10. Upload API 404 for unknown routes
            notfound_status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${fn_url}/nonexistent")
            check "Upload API returns 404 for unknown routes" "$([ "$notfound_status" = "404" ] && echo true || echo false)"
          else
            check "Upload API URL resolved" "false"
          fi

          echo ""
          echo "=== Results: ${passed} passed, ${failed} failed ==="

          # Write summary
          echo "### Smoke Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "Service URL: [${url}](${url})" >> "$GITHUB_STEP_SUMMARY"
          echo "Results: **${passed} passed**, **${failed} failed**" >> "$GITHUB_STEP_SUMMARY"

          if [ "$failed" -gt 0 ]; then
            exit 1
          fi
