name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'Dockerfile'
      - 'nginx.conf'
  workflow_dispatch:

env:
  PROJECT_ID: data-feeder-lcd
  REGION: australia-southeast1
  AR_REPO: data-feeder-images
  SERVICE_NAME: data-feeder-api

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Get Upload API function URL
        id: fn-url
        run: |
          url=$(gcloud functions describe upload-api \
            --gen2 \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(serviceConfig.uri)' 2>/dev/null || echo "")
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --build-arg VITE_UPLOAD_API_URL="${{ steps.fn-url.outputs.url }}" \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Smoke test deployment
        run: |
          url=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')

          echo "Testing ${url}..."

          # Verify the service returns the SPA, not the Cloud Run placeholder
          body=$(curl -s --max-time 30 "${url}")

          if echo "$body" | grep -q "Data Feeder"; then
            echo "✅ SPA is serving correctly"
          else
            echo "❌ SPA not detected — got placeholder or unexpected content:"
            echo "$body" | head -5
            exit 1
          fi

          # Verify health endpoint
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${url}/health")
          if [ "$status" = "200" ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed with status ${status}"
            exit 1
          fi

          echo "### Deployed to Cloud Run" >> "$GITHUB_STEP_SUMMARY"
          echo "Service URL: [${url}](${url})" >> "$GITHUB_STEP_SUMMARY"
          echo "Smoke test: ✅ SPA verified, health check passed" >> "$GITHUB_STEP_SUMMARY"
