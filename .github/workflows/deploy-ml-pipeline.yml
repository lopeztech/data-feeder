name: Deploy ML Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'pipelines/ml/**'
  workflow_dispatch:
    inputs:
      run_pipeline:
        description: 'Submit pipeline run after deploy'
        type: boolean
        default: true

env:
  PROJECT_ID: data-feeder-lcd
  REGION: australia-southeast1
  SERVICE_ACCOUNT: sa-ml-v@data-feeder-lcd.iam.gserviceaccount.com
  GCS_BUCKET: gs://data-feeder-lcd-ml-artifacts

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy ML Pipeline
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: pipelines/ml
        run: pip install -r requirements.txt

      - name: Create BigQuery feature view
        run: |
          bq query \
            --project_id=${{ env.PROJECT_ID }} \
            --use_legacy_sql=false \
            < pipelines/ml/sql/player_features_view.sql

      - name: Create pipeline_runs table
        run: |
          bq query \
            --project_id=${{ env.PROJECT_ID }} \
            --use_legacy_sql=false \
            < pipelines/ml/sql/pipeline_runs_table.sql

      # --- Clustering pipeline ---
      - name: Compile clustering pipeline
        working-directory: pipelines/ml
        run: python pipeline.py

      - name: Upload clustering pipeline to GCS
        working-directory: pipelines/ml
        run: gsutil cp pipeline.json ${{ env.GCS_BUCKET }}/pipelines/player-role-clustering/pipeline.json

      - name: Submit clustering pipeline
        if: (github.event_name == 'workflow_dispatch' && inputs.run_pipeline) || github.event_name == 'push'
        working-directory: pipelines/ml
        run: |
          python -c "
          from google.cloud import aiplatform
          aiplatform.init(project='${{ env.PROJECT_ID }}', location='${{ env.REGION }}')
          job = aiplatform.PipelineJob(
              display_name='player-role-clustering-$(date +%Y%m%d-%H%M)',
              template_path='pipeline.json',
              pipeline_root='${{ env.GCS_BUCKET }}/pipeline-runs',
              parameter_values={'project_id': '${{ env.PROJECT_ID }}', 'region': '${{ env.REGION }}'},
          )
          job.submit(service_account='${{ env.SERVICE_ACCOUNT }}')
          print(f'Clustering pipeline submitted: {job.resource_name}')
          "

      # --- Anomaly detection pipeline ---
      - name: Compile anomaly pipeline
        working-directory: pipelines/ml
        run: python anomaly_pipeline.py

      - name: Upload anomaly pipeline to GCS
        working-directory: pipelines/ml
        run: gsutil cp anomaly_pipeline.json ${{ env.GCS_BUCKET }}/pipelines/player-anomaly-detection/pipeline.json

      - name: Submit anomaly pipeline
        if: (github.event_name == 'workflow_dispatch' && inputs.run_pipeline) || github.event_name == 'push'
        working-directory: pipelines/ml
        run: |
          python -c "
          from google.cloud import aiplatform
          aiplatform.init(project='${{ env.PROJECT_ID }}', location='${{ env.REGION }}')
          job = aiplatform.PipelineJob(
              display_name='player-anomaly-detection-$(date +%Y%m%d-%H%M)',
              template_path='anomaly_pipeline.json',
              pipeline_root='${{ env.GCS_BUCKET }}/pipeline-runs',
              parameter_values={'project_id': '${{ env.PROJECT_ID }}', 'region': '${{ env.REGION }}'},
          )
          job.submit(service_account='${{ env.SERVICE_ACCOUNT }}')
          print(f'Anomaly pipeline submitted: {job.resource_name}')
          "

      # --- Rating prediction pipeline ---
      - name: Compile rating pipeline
        working-directory: pipelines/ml
        run: python rating_pipeline.py

      - name: Upload rating pipeline to GCS
        working-directory: pipelines/ml
        run: gsutil cp rating_pipeline.json ${{ env.GCS_BUCKET }}/pipelines/player-rating-prediction/pipeline.json

      - name: Submit rating pipeline
        if: (github.event_name == 'workflow_dispatch' && inputs.run_pipeline) || github.event_name == 'push'
        working-directory: pipelines/ml
        run: |
          python -c "
          from google.cloud import aiplatform
          aiplatform.init(project='${{ env.PROJECT_ID }}', location='${{ env.REGION }}')
          job = aiplatform.PipelineJob(
              display_name='player-rating-prediction-$(date +%Y%m%d-%H%M)',
              template_path='rating_pipeline.json',
              pipeline_root='${{ env.GCS_BUCKET }}/pipeline-runs',
              parameter_values={'project_id': '${{ env.PROJECT_ID }}', 'region': '${{ env.REGION }}'},
          )
          job.submit(service_account='${{ env.SERVICE_ACCOUNT }}')
          print(f'Rating pipeline submitted: {job.resource_name}')
          "

      - name: Show pipeline info
        run: |
          echo "### ML Pipelines Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Clustering**: \`player-role-clustering\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Anomaly Detection**: \`player-anomaly-detection\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Rating Prediction**: \`player-rating-prediction\`" >> "$GITHUB_STEP_SUMMARY"
