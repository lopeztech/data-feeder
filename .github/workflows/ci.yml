name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npx vitest run --coverage --reporter=default --passWithNoTests

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage/coverage-final.json
          flags: spa
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  test-functions:
    name: Function Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        function: [validator]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/${{ matrix.function }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions/${{ matrix.function }}

      - name: Run tests with coverage
        run: npx vitest run --coverage --passWithNoTests
        working-directory: functions/${{ matrix.function }}

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: functions/${{ matrix.function }}/coverage/coverage-final.json
          flags: ${{ matrix.function }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
